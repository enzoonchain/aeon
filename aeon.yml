# Aeon configuration — Venice AI Edition
# Runs on GitHub Actions using Venice API (DIEM-powered)

model: "venice-uncensored"

# Gateway: direct Venice API (no Bankr needed)
gateway:
  provider: venice

skills:
  # --- Heartbeat (self-healing) ---
  heartbeat: { enabled: true, schedule: "0 7,13,19 * * *" }
  skill-health: { enabled: true, schedule: "0 8 * * *" }
  cost-report: { enabled: true, schedule: "0 9 * * 1" }

  # --- Crypto & Markets ---
  token-movers: { enabled: true, schedule: "0 12 * * *" }
  defi-monitor: { enabled: true, schedule: "0 12 * * *" }
  on-chain-monitor: { enabled: true, schedule: "0 14 * * *" }

  # --- Research & Content ---
  deep-research: { enabled: false, schedule: "0 10 * * *" }
  morning-brief: { enabled: true, schedule: "0 7 * * *" }

  # --- Dev & Code ---
  pr-review: { enabled: false, schedule: "0 9 * * *" }
  github-monitor: { enabled: false, schedule: "0 9 * * *" }

  # --- Meta ---
  self-improve: { enabled: false, schedule: "0 22 * * 0" }
  skill-repair: { enabled: false, schedule: "reactive" }

# Chains (multi-step workflows)
chains:
  daily-report:
    - morning-brief
    - token-movers
    - defi-monitor
